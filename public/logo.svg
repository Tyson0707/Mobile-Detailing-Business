<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 85" fill="none">
  <defs>
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="12%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="white" stop-opacity="1"/>
      <stop offset="88%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Car roofline swoosh: horizontal lines with arch in center -->
  <path d="M 38,28 L 60,28 C 66,28 72,22 80,16 L 94,11 L 150,11 L 168,11 C 176,17 182,22 190,28 L 200,28 L 262,28"
    stroke="url(#swooshGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Sparkle left (4-point star) -->
  <g transform="translate(38,28)">
    <path d="M0,-6 L0.9,-0.9 L6,0 L0.9,0.9 L0,6 L-0.9,0.9 L-6,0 L-0.9,-0.9 Z" fill="white" opacity="0.95"/>
  </g>
  <!-- Smaller secondary sparkle left -->
  <g transform="translate(38,28) rotate(45)">
    <path d="M0,-3.5 L0.5,-0.5 L3.5,0 L0.5,0.5 L0,3.5 L-0.5,0.5 L-3.5,0 L-0.5,-0.5 Z" fill="white" opacity="0.5"/>
  </g>

  <!-- Sparkle right (4-point star) -->
  <g transform="translate(262,28)">
    <path d="M0,-6 L0.9,-0.9 L6,0 L0.9,0.9 L0,6 L-0.9,0.9 L-6,0 L-0.9,-0.9 Z" fill="white" opacity="0.95"/>
  </g>
  <!-- Smaller secondary sparkle right -->
  <g transform="translate(262,28) rotate(45)">
    <path d="M0,-3.5 L0.5,-0.5 L3.5,0 L0.5,0.5 L0,3.5 L-0.5,0.5 L-3.5,0 L-0.5,-0.5 Z" fill="white" opacity="0.5"/>
  </g>

  <!-- CLEAR LINE wordmark -->
  <text x="150" y="57"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="23"
    font-weight="700"
    letter-spacing="7"
    fill="white">CLEAR LINE</text>

  <!-- AUTO DETAIL -->
  <text x="150" y="73"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="4"
    fill="#64748b">AUTO DETAIL</text>
</svg>
