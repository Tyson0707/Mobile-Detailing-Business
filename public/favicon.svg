<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background -->
  <rect width="64" height="64" rx="8" fill="#080d1a"/>

  <!-- Car roofline micro swoosh -->
  <path d="M 10,26 L 18,26 C 20,26 23,22 26,19 L 30,17 L 34,17 L 38,19 C 41,22 44,26 46,26 L 54,26"
    stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Tiny sparkle left -->
  <path d="M10,26 L10.6,24.2 L12.4,26 L10.6,27.8 Z" fill="white" opacity="0.85"/>
  <!-- Tiny sparkle right -->
  <path d="M54,26 L54.6,24.2 L56.4,26 L54.6,27.8 Z" fill="white" opacity="0.85"/>

  <!-- CL monogram -->
  <text x="32" y="47"
    text-anchor="middle"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="17"
    font-weight="900"
    letter-spacing="1"
    fill="white">CL</text>

  <!-- Blue accent line -->
  <line x1="20" y1="52" x2="44" y2="52" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
</svg>
